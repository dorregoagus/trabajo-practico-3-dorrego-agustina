<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson - Buscador de Personajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <!-- Fuente de texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuyu&display=swap" rel="stylesheet">
</head>

<body>

    <main class="container my-4">
        <!-- buscador -->
        <section class="mb-4">
            <label for="inputBuscar" class="form-label fw-bold">Buscar personaje por nombre</label>
            <div class="input-group">
                <input type="text" id="inputBuscar" class="form-control" placeholder="Ej: Homer, Bart, Lisa..."
                    style="font-size: 40px" />
                <button id="btnBuscar" class="btn btn-danger" type="button">Buscar
                </button>
                <button id="btnLimpiar" class="btn btn-outline-secondary" type="button">Ver todos
                </button>
            </div>
            <!-- mostrar mensares en respuesta -->
            <div id="mensajeAlerta" class="mt-2"></div>
        </section>
        <!-- loader -->
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2">Cargando personajes...</p>
        </div>
        <!-- listado de tarjetas -->
        <section id="contenedorPersonajes" class="row g-4"></section>
    </main>
    <!-- modal de detalle -->
    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-labelledby="modalDetalleLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalDetalleLabel">Detalle del personaje</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="modalDetalleBody">
                    <!-- contenido completado desde js -->
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
